<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pymonitor - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="main-title">pymonitor</h1>
    <hr class="header-hr"/>
    <div class="content">
        <h2>Your IP: </h2>
        <p id="local_ip"></p>
    </div>
    <hr class="header-hr"/>
    <p>Note: scan may take up to 2 minutes.</p>
    <div class="content">
        <h2 class="scan-result-title">Scan result</h2>
        <button onclick="scan_ip_range()">Start Scan</button>
    </div>
    <div id="ping_result">
        <p id="result_helper"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
