<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>woninet Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="dashboard">
        <header class="topbar">
            <div>
                <p class="eyebrow">Network Monitoring</p>
                <h1>woninet Dashboard</h1>
                <p class="subtitle">Live device visibility and latency overview</p>
            </div>
            <div class="api-status">
                <span id="status_dot" class="status-dot"></span>
                <span id="status_text">Connected</span>
            </div>
        </header>

        <!-- KPI CARDS -->
        <section class="overview-grid">

            <div class="kpi-card">
                <div class="kpi-icon">
                    <i class="fa-solid fa-server"></i>
                    <span>Total Devices</span>
                </div>
                <h2 id="total_devices">0</h2>
            </div>

            <div class="kpi-card">
                <div class="kpi-icon success">
                    <i class="fa-solid fa-circle-check"></i>
                    <span>Online</span>
                </div>
                <h2 id="online_devices">0</h2>
            </div>

            <div class="kpi-card">
                <div class="kpi-icon primary">
                    <i class="fa-solid fa-wave-square"></i>
                    <span>Average Latency</span>
                </div>
                <h2 id="avg_latency">0 ms</h2>
            </div>

            <div class="kpi-card">
                <div class="kpi-icon warning">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Packet Loss</span>
                </div>
                <h2 id="avg_packet_loss">0%</h2>
            </div>
        </section>

        <section class="toolbar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="search" type="text" placeholder="Search IP address or MAC address">
            </div>

            <div>
                <select id="filter_status">
                    <option value="all">All Devices</option>
                    <option value="online">Online</option>
                    <option value="degraded">Degraded</option>
                    <option value="offline">Offline</option>
                </select>
            </div>
        </section>

        <main class="main-layout">
            <section class="panel">
                <div class="panel-header">
                    <div>
                        <h2>Devices</h2>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table class="device-table">
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>IP Address</th>
                                <th>Latency</th>
                                <th>Packet Loss</th>
                                <th>MAC Address</th>
                                <th>Last Seen</th>
                                <th>Details</th>
                            </tr>
                        </thead>

                        <tbody id="devices">
                            <tr>
                                <td colspan="7">
                                    <div id="loader" class="loader"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
            <aside class="events-panel">
                <h3>Recent Events</h3>
                <div id="events"></div>
            </aside>
        </main>

    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
