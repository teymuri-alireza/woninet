<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | woninet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/404.css">
</head>

<body>

<div class="card">

    <div class="network-icon">

        <i class="fa-solid fa-network-wired"></i>

    </div>

    <h1>404</h1>

    <h2>Node Not Found</h2>

    <p>

        The requested endpoint could not be reached.
        It may have been moved, removed, or the address
        you entered does not exist within the monitored
        network.

    </p>

    <div class="status">

        <span class="status-dot"></span>

        Route lookup failed

    </div>

    <div class="divider"></div>

    <div class="actions">

        <a href="/" class="btn btn-primary">

            <i class="fa-solid fa-house"></i>

            Return to Dashboard

        </a>

        <a href="javascript:history.back()" class="btn btn-secondary">

            <i class="fa-solid fa-arrow-left"></i>

            Go Back

        </a>

    </div>

    <div class="footer">

        woninet • Network Monitoring Dashboard

    </div>

</div>

</body>

</html>
