<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="dashboard">
        <header class="topbar">
            <div>
                <p class="eyebrow">Device Details</p>
                <h1 id="device-ip"></h1>
                <p class="subtitle">Live monitoring and alert history</p>
            </div>
        </header>

        <section class="overview-grid">
            <div class="kpi-card">
                <div class="kpi-icon primary">
                    <i class="fa-solid fa-network-wired"></i>
                    <span>MAC Address</span>
                </div>
                <h2 style="font-size: 1rem;" id="device-mac"></h2>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon primary">
                    <i class="fa-solid fa-wave-square"></i>
                    <span>Latency</span>
                </div>
                <h2 id="device-latency"></h2>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon warning">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Packet Loss</span>
                </div>
                <h2 id="device-packet-loss"></h2>
            </div>
        </section>

        <main class="main-layout">
            <section class="panel">
                <div class="panel-header">
                    <h2>Device Details</h2>
                </div>
                <div class="device-grid">
                    <article class="device-card" id="device-card">
                        <div class="device-header">
                            <div class="device-status" id="device-status"></div>
                        </div>
                        
                        <div class="metrics">
                            <div class="metric">
                                <div class="metric-label">Last Seen</div>
                                <div class="metric-value" id="device-last-seen"></div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Latency State</div>
                                <div class="metric-value" id="alert-state-latency"></div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Packet Loss State</div>
                                <div class="metric-value" id="alert-state-packet-loss">}</div>
                            </div>
                        </div>
                    </article>
                </div>
            </section>

            <aside class="events-panel">
                <h3>Alert Events</h3>
                <div id="events"></div>
            </aside>
        </main>

        <br />
        <section class="panel">
            <h2>Recent Device Events Graph</h2>
            <img width="100%" src="placeholder" alt="Device recent events line graph" id="device-recent-events-line-graph"/>
        </section>

        <div style="margin-top: 20px;">
            <a href="/" class="back-link">Back to Dashboard</a>
        </div>
    </div>

    <script src="/static/js/device_info.js"></script>
</body>
</html>
